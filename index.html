<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa — perfis de lojistas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #333;
            overflow: hidden;
        }

        .presentation-container {
            display: flex;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }

        .slides-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .slide-viewer {
            flex: 1;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .slide-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .slide-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }

        .slide-nav-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .slide-nav-btn:hover:not(:disabled) { background: #0056b3; }
        .slide-nav-btn:disabled { background: #ccc; cursor: not-allowed; opacity: 0.5; }

        .slide-counter {
            font-weight: 600;
            color: #666;
            min-width: 80px;
            text-align: center;
        }

        .comments-section {
            width: 380px;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .comments-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .comments-header h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .comments-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .comment-form {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
        }

        .form-group textarea {
            min-height: 60px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .submit-btn:hover { transform: translateY(-2px); }
        .submit-btn:active { transform: translateY(0); }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .comment-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid #667eea;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
            gap: 8px;
        }

        .comment-author {
            font-weight: 600;
            font-size: 13px;
            color: #333;
        }

        .comment-date {
            font-size: 11px;
            color: #999;
        }

        .comment-text {
            font-size: 13px;
            color: #555;
            line-height: 1.4;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .comment-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .comment-item:hover .comment-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 3px;
            transition: background 0.2s;
            color: #666;
        }

        .action-btn:hover { background: #e0e0e0; }
        .action-btn.delete:hover { background: #ffebee; color: #d32f2f; }
        .action-btn.edit:hover { background: #e8f5e9; color: #388e3c; }

        .edit-form {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #ddd;
        }

        .edit-form textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
            min-height: 50px;
            margin-bottom: 6px;
        }

        .edit-form-actions {
            display: flex;
            gap: 6px;
        }

        .edit-form-actions button {
            flex: 1;
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .edit-form-actions .save-btn {
            background: #388e3c;
            color: white;
        }

        .edit-form-actions .save-btn:hover { background: #2e7d32; }

        .edit-form-actions .cancel-btn {
            background: #e0e0e0;
            color: #333;
        }

        .edit-form-actions .cancel-btn:hover { background: #d0d0d0; }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
            padding: 20px;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        @media (max-width: 1200px) {
            .presentation-container {
                flex-direction: column;
                gap: 15px;
            }

            .comments-section {
                width: 100%;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="presentation-container">
        <div class="slides-section">
            <div class="slide-viewer">
                <img id="slideImage" class="slide-image" src="" alt="Slide">
            </div>
            <div class="slide-controls">
                <button class="slide-nav-btn" id="prevBtn">← Anterior</button>
                <span class="slide-counter"><span id="currentSlide">1</span> / <span id="totalSlides">0</span></span>
                <button class="slide-nav-btn" id="nextBtn">Próximo →</button>
            </div>
        </div>

        <div class="comments-section">
            <div class="comments-header">
                <h2>💬 Comentários</h2>
                <p id="slideInfo">Slide 1</p>
            </div>

            <div class="comment-form">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="authorInput" placeholder="Seu nome">
                </div>
                <div class="form-group">
                    <label>Comentário</label>
                    <textarea id="textInput" placeholder="Escreva seu comentário..."></textarea>
                </div>
                <button class="submit-btn" id="submitBtn">Enviar Comentário</button>
            </div>

            <div id="commentsList" class="comments-list">
                <div class="empty-state">Nenhum comentário ainda</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let slides = [];
        let currentSlideIndex = 0;
        let comments = {};

        // Carregar lista de slides
        async function loadSlides() {
            const slideNames = [
                'alem-superficie-ciclo-financeiro-lojistas.png',
                'arquetipos-comportamentais-base.png',
                'arquetipos-comportamentais-v2.png',
                'deep-dive-alta-performance-sob-demanda.png',
                'deep-dive-dropshipping-caixa-invertido.png',
                'deep-dive-segmento-impenetravel.png',
                'deep-dive-varejo-alto-giro.png',
                'descasamento-caixa-nao-e-dor-principal.png',
                'efeito-colateral-dependencia-plataforma.png',
                'friccao-core-1-panico-retencao-passiva.png',
                'friccao-core-2-miopia-juros-prazo.png',
                'lojista-credito-mitos-vs-realidade-sintese.png',
                'mito-realidade-1-gatilho-credito.png',
                'mito-realidade-2-hemorragia-omnicanal.png',
                'mito-realidade-3-linha-tempo-carencia.png',
                'mito-realidade-slide.png',
                'nova-arquitetura-credito-proximos-passos.png',
                'pivo-estrategico-1-venda-cruzada-hibrido.png',
                'pivo-estrategico-2-credito-giro-rapido-modelo-hibrido.png',
                'raio-x-comportamento-financeiro-1-posturas.png',
                'raio-x-comportamento-financeiro-2-gatilho-credito.png',
                'raio-x-comportamento-financeiro-3-posturas.png',
                'segmento-perfil-lojista-foco.png',
                'sintese-um-insight-capital.png',
                'slide-intro.png',
                'slide-outro.png',
                'sumario-executivo-achados.png',
                'veredito-hipotese-inicial-invalidada.png'
            ];

            slides = slideNames.filter(name => {
                const path = `${name}`;
                return true;
            });

            document.getElementById('totalSlides').textContent = slides.length;
            showSlide(0);
        }

        function showSlide(index) {
            if (index < 0 || index >= slides.length) return;

            currentSlideIndex = index;
            const slideId = String(index);
            document.getElementById('slideImage').src = `/${slides[index]}`;
            document.getElementById('currentSlide').textContent = index + 1;
            document.getElementById('slideInfo').textContent = `Slide ${index + 1}`;

            loadComments(slideId);
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            showSlide(currentSlideIndex - 1);
            updateNavButtons();
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            showSlide(currentSlideIndex + 1);
            updateNavButtons();
        });

        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentSlideIndex === 0;
            document.getElementById('nextBtn').disabled = currentSlideIndex === slides.length - 1;
        }

        // Teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') showSlide(currentSlideIndex - 1), updateNavButtons();
            if (e.key === 'ArrowRight') showSlide(currentSlideIndex + 1), updateNavButtons();
        });

        // API
        async function loadComments(slideId) {
            try {
                const response = await fetch(`${API_BASE}/api/comments?slide=${slideId}`);
                const data = await response.json();
                comments[slideId] = Array.isArray(data) ? data : [];
                renderComments(slideId);
            } catch (error) {
                console.error('Erro ao carregar comentários:', error);
            }
        }

        async function postComment() {
            const author = document.getElementById('authorInput').value.trim();
            const text = document.getElementById('textInput').value.trim();

            if (!text) {
                alert('Escreva um comentário');
                return;
            }

            const slideId = String(currentSlideIndex);

            try {
                const response = await fetch(`${API_BASE}/api/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        slide: slideId,
                        author: author || 'Anônimo',
                        text
                    })
                });

                const data = await response.json();
                if (data.ok) {
                    document.getElementById('authorInput').value = '';
                    document.getElementById('textInput').value = '';
                    loadComments(slideId);
                }
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        async function deleteComment(commentId) {
            if (!confirm('Tem certeza que deseja deletar este comentário?')) return;

            try {
                const response = await fetch(`${API_BASE}/api/comments?id=${commentId}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();
                if (data.ok) {
                    loadComments(String(currentSlideIndex));
                }
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        async function updateComment(commentId, newText) {
            if (!newText.trim()) {
                alert('Texto não pode estar vazio');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/comments?id=${commentId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: newText.trim() })
                });

                const data = await response.json();
                if (data.ok) {
                    loadComments(String(currentSlideIndex));
                }
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        function renderComments(slideId) {
            const list = document.getElementById('commentsList');
            const commentList = comments[slideId] || [];

            if (commentList.length === 0) {
                list.innerHTML = '<div class="empty-state">Nenhum comentário ainda</div>';
                return;
            }

            list.innerHTML = commentList.map(comment => `
                <div class="comment-item" data-id="${comment.id}">
                    <div class="comment-header">
                        <div>
                            <div class="comment-author">${escapeHtml(comment.author)}</div>
                            <div class="comment-date">${formatDate(comment.timestamp)}</div>
                        </div>
                    </div>
                    <div class="comment-text" id="text-${comment.id}">${escapeHtml(comment.text)}</div>
                    <div class="comment-actions">
                        <button class="action-btn edit" onclick="toggleEditForm('${comment.id}', '${escapeHtml(comment.text).replace(/'/g, "\\'")}')">✏️ Editar</button>
                        <button class="action-btn delete" onclick="deleteComment('${comment.id}')">🗑️ Deletar</button>
                    </div>
                    <div class="edit-form" id="edit-form-${comment.id}" style="display: none;">
                        <textarea id="edit-text-${comment.id}">${escapeHtml(comment.text)}</textarea>
                        <div class="edit-form-actions">
                            <button class="save-btn" onclick="saveEdit('${comment.id}')">Salvar</button>
                            <button class="cancel-btn" onclick="toggleEditForm('${comment.id}')">Cancelar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleEditForm(commentId, text = '') {
            const form = document.getElementById(`edit-form-${commentId}`);
            form.style.display = form.style.display === 'none' ? 'block' : 'none';

            if (form.style.display === 'block') {
                const textarea = document.getElementById(`edit-text-${commentId}`);
                textarea.focus();
                textarea.select();
            }
        }

        function saveEdit(commentId) {
            const newText = document.getElementById(`edit-text-${commentId}`).value;
            updateComment(commentId, newText);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(isoDate) {
            const date = new Date(isoDate);
            return date.toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        document.getElementById('submitBtn').addEventListener('click', postComment);

        // Enter para submeter
        document.getElementById('textInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                postComment();
            }
        });

        // Inicializar
        loadSlides();
        updateNavButtons();
    </script>
</body>
</html>
