<script>
(function(){
  function pfSetLang(l){
    localStorage.setItem('portfolio-lang', l);
    document.getElementById('pf-btn-en').classList.toggle('active', l === 'en');
    document.getElementById('pf-btn-pt').classList.toggle('active', l === 'pt');
    // Dispatch storage event so any SPA listening can pick it up
    window.dispatchEvent(new StorageEvent('storage', { key: 'portfolio-lang', newValue: l }));
  }
  // Set initial active state
  var cur = localStorage.getItem('portfolio-lang') || 'en';
  document.getElementById('pf-btn-en').classList.toggle('active', cur === 'en');
  document.getElementById('pf-btn-pt').classList.toggle('active', cur === 'pt');
})();
</script>

    <script>
      (function () {
        function appMounted() {
          var root = document.getElementById("root");
          return root && root.querySelector(".pres-root");
        }

        function isExternalResourceTarget(t) {
          if (!t || t === window || t === document || t === document.documentElement) return false;
          var tag = t.tagName;
          if (tag !== "LINK" && tag !== "SCRIPT" && tag !== "IMG") return false;
          var urlStr = t.src || t.href;
          if (!urlStr) return false;
          try {
            var u = new URL(urlStr, window.location.href);
            return u.origin !== window.location.origin;
          } catch (e) {
            return true;
          }
        }

        function formatBootError(ev) {
          if (ev.message) return String(ev.message);
          if (ev.error) {
            if (ev.error instanceof Error) return ev.error.message || String(ev.error);
            return String(ev.error);
          }
          var parts = [];
          if (ev.filename) parts.push(ev.filename + ":" + ev.lineno + ":" + ev.colno);
          var t = ev.target;
          if (t && t !== window) {
            if (t.src) parts.push("Recurso: " + t.src);
            else if (t.href) parts.push("Recurso: " + t.href);
          }
          return parts.length ? parts.join(" · ") : "Erro sem mensagem (abrir F12 → Consola para detalhes).";
        }

        function showFatalInRoot(msg) {
          var root = document.getElementById("root");
          if (!root || root.querySelector(".pres-fatal")) return;
          root.innerHTML =
            '<div class="pres-boot pres-fatal" style="background:#fedede;padding:1.5rem;border-radius:8px;max-width:40rem;margin:2rem auto">' +
            "<strong>Erro ao carregar a página</strong>" +
            '<p style="word-break:break-word;margin-top:0.5rem">' +
            msg.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") +
            "</p></div>";
        }

        window.addEventListener(
          "error",
          function (ev) {
            if (appMounted()) {
              return;
            }
            if (isExternalResourceTarget(ev.target)) {
              return;
            }
            var root = document.getElementById("root");
            if (!root || root.querySelector(".pres-fatal")) return;
            var msg = formatBootError(ev);
            if (!ev.message && !ev.error && !ev.filename && ev.target === window) {
              return;
            }
            showFatalInRoot(msg);
          },
          true,
        );

        window.addEventListener("unhandledrejection", function (ev) {
          if (appMounted()) {
            console.error("Promise rejeitada (após montagem):", ev.reason);
            return;
          }
          var root = document.getElementById("root");
          if (!root || root.querySelector(".pres-fatal")) return;
          var msg =
            ev.reason instanceof Error ? ev.reason.message || String(ev.reason) : String(ev.reason || "desconhecido");
          showFatalInRoot(msg);
        });
      })();
    </script>
    <script>
      // Sistema robusto de interceptação de cliques para edit/delete
      const API_BASE = window.location.origin;
      const processedButtons = new WeakSet();

      async function deleteComment(commentId) {
        if (!confirm('Tem certeza que deseja deletar este comentário?')) return;
        try {
          const response = await fetch(`${API_BASE}/api/comments?id=${commentId}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' }
          });
          const data = await response.json();
          if (data.ok) {
            setTimeout(() => location.reload(), 300);
          } else {
            alert('Erro ao deletar: ' + (data.error || 'desconhecido'));
          }
        } catch (error) {
          console.error('Erro delete:', error);
          alert('Erro ao deletar comentário');
        }
      }

      async function updateComment(commentId, newText) {
        if (!newText.trim()) {
          alert('Texto não pode estar vazio');
          return;
        }
        try {
          const response = await fetch(`${API_BASE}/api/comments?id=${commentId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: newText.trim() })
          });
          const data = await response.json();
          if (data.ok) {
            setTimeout(() => location.reload(), 300);
          } else {
            alert('Erro ao editar: ' + (data.error || 'desconhecido'));
          }
        } catch (error) {
          console.error('Erro update:', error);
          alert('Erro ao editar comentário');
        }
      }

      // Interceptar cliques GLOBALMENTE
      document.addEventListener('click', function(e) {
        const btn = e.target.closest('button');
        if (!btn) return;

        const text = btn.textContent.trim();

        // Deletar comentário
        if (text.includes('🗑️') || text.includes('Deletar') || text.includes('Apagar')) {
          e.preventDefault();
          e.stopPropagation();
          // Tentar extrair ID do atributo data ou do elemento pai
          const commentEl = btn.closest('[data-comment-id]') || btn.closest('.comment-item');
          const commentId = commentEl?.getAttribute('data-comment-id') || commentEl?.id?.replace('comment-', '');
          if (commentId) {
            deleteComment(commentId);
            return;
          }
        }

        // Editar comentário
        if (text.includes('✏️') || text.includes('Editar')) {
          e.preventDefault();
          e.stopPropagation();
          const commentEl = btn.closest('[data-comment-id]') || btn.closest('.comment-item');
          const commentId = commentEl?.getAttribute('data-comment-id') || commentEl?.id?.replace('comment-', '');
          if (commentId) {
            // Procura por um textarea que possa ser editado ou cria um prompt
            const form = document.querySelector(`#edit-form-${commentId}`);
            if (form) {
              form.style.display = form.style.display === 'none' ? 'block' : 'none';
            } else {
              // Fallback: prompt direto
              const currentText = btn.closest('.comment-item')?.querySelector('[data-comment-text]')?.textContent || '';
              const newText = prompt('Editar comentário:', currentText);
              if (newText !== null) {
                updateComment(commentId, newText);
              }
            }
            return;
          }
        }
      }, true);

      console.log('Sistema de editar/deletar comentários ativado');
    </script>
